<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS WORLD TOUR 'ARIRANG' — スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8174B;
    --dark: #0A0A0A;
    --mid: #111111;
    --card: #161616;
    --border: #2a2a2a;
    --text: #E8E0D8;
    --muted: #888;
    --gold: #C9A84C;
    --green: #2ECC71;
    --blue: #4A9EDB;
    --purple: #9B59B6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 60px 40px 40px;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0A0A0A 0%, #1a0810 50%, #0A0A0A 100%);
  }

  .hero::before {
    content: 'ARIRANG';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 200px);
    color: rgba(232,23,75,0.04);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.1em;
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .hero-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 10px;
    letter-spacing: 0.3em;
    padding: 4px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 90px);
    line-height: 0.9;
    letter-spacing: 0.05em;
    color: white;
    margin-bottom: 8px;
  }

  .hero-title span { color: var(--red); }

  .hero-sub {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 32px;
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--red);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* TABS */
  .tabs-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    padding: 0 40px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs-inner::-webkit-scrollbar { display: none; }

  .tab {
    padding: 16px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  /* MAIN */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  /* SECTION HEADERS */
  .section-head {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    margin-top: 48px;
  }

  .section-head:first-child { margin-top: 0; }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.1em;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* TIMELINE */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .event-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 130px 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    position: relative;
  }

  .event-card:hover {
    background: #1e1e1e;
    border-color: #3a3a3a;
  }

  .event-card.concert { border-left-color: var(--red); }
  .event-card.ticket-jp { border-left-color: var(--gold); }
  .event-card.ticket-global { border-left-color: var(--blue); }
  .event-card.result { border-left-color: var(--green); }
  .event-card.album { border-left-color: var(--purple); }
  .event-card.special { border-left-color: #FF6B35; }
  .event-card.passed { opacity: 0.45; }
  .event-card.today { 
    background: rgba(232,23,75,0.06);
    border-color: var(--red);
  }

  .event-date {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .date-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .date-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .event-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .event-type {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .event-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .event-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .event-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .tag {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    border: 1px solid currentColor;
  }

  .tag-jp { color: var(--gold); }
  .tag-global { color: var(--blue); }
  .tag-fc { color: var(--green); }
  .tag-mobile { color: #FF6B35; }
  .tag-army { color: var(--purple); }
  .tag-free { color: var(--red); }

  .event-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .today-badge {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    padding: 2px 8px;
    letter-spacing: 0.1em;
  }

  .days-until {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--muted);
  }

  .days-until.soon { color: var(--gold); }
  .days-until.very-soon { color: var(--red); }

  /* MEMO */
  .memo-area {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    grid-column: 1 / -1;
  }

  .memo-area.open { display: block; }

  .memo-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .memo-input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }

  .memo-input:focus { border-color: var(--red); }

  .memo-saved {
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.1em;
    margin-top: 4px;
    display: none;
  }

  .memo-btn {
    display: inline-block;
    margin-top: 8px;
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .memo-btn:hover { background: #c41240; }

  .has-memo-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: white; }

  /* MEMO TAB */
  .memo-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .memo-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 16px 20px;
  }

  .memo-entry-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.1em;
  }

  .memo-entry-event {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .memo-entry-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.8;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .hero { padding: 40px 20px 30px; }
    .main { padding: 24px 20px; }
    .tabs-inner { padding: 0 20px; }
    .event-card {
      grid-template-columns: 100px 1fr;
    }
    .event-actions { display: none; }
  }

  /* ANIMATIONS */
  .event-card {
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 1px;
  }

  .scroll-indicator {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--red);
    color: white;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
  }

  .scroll-indicator.visible { opacity: 1; }

  /* CALENDAR */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .cal-nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .cal-nav-btn:hover { background: #222; }

  .cal-month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-dow {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    padding: 6px 0;
  }

  .cal-dow:first-child { color: #e87070; }
  .cal-dow:last-child { color: #7090e8; }

  .cal-day {
    aspect-ratio: 1;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 2px;
    cursor: default;
    position: relative;
    min-height: 48px;
    transition: background 0.15s;
  }

  .cal-day.empty { background: transparent; border-color: transparent; }

  .cal-day.has-events {
    cursor: pointer;
    border-color: #333;
  }

  .cal-day.has-events:hover { background: #1e1e1e; }

  .cal-day.is-today { border-color: var(--red); }

  .cal-day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    line-height: 1;
    color: var(--muted);
  }

  .cal-day.has-events .cal-day-num { color: var(--text); }
  .cal-day.is-today .cal-day-num { color: var(--red); }

  .cal-dots {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 3px;
  }

  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* POPUP */
  .cal-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
  }

  .cal-popup {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 2px solid var(--red);
    padding: 24px 24px 32px;
    z-index: 400;
    max-height: 75vh;
    overflow-y: auto;
    border-radius: 16px 16px 0 0;
  }

  .cal-popup.open, .cal-popup-overlay.open { display: block; }

  .cal-popup-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    color: var(--red);
    margin-bottom: 16px;
  }

  .cal-popup-events {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .cal-popup-event {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cal-popup-event:hover { background: #1e1e1e; }

  .cal-popup-event-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .cal-popup-event-bar {
    width: 4px;
    height: 36px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .cal-popup-event-info {}

  .cal-popup-event-type {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .cal-popup-event-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }

  .cal-popup-event-arrow {
    font-size: 18px;
    color: var(--muted);
  }

  .cal-popup-close {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cal-popup-close:hover { border-color: var(--red); color: var(--red); }

</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">BTS WORLD TOUR</div>
    <h1 class="hero-title">ARIRANG<br><span>'26-'27</span></h1>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num">82+</div>
        <div class="stat-label">SHOWS</div>
      </div>
      <div class="stat">
        <div class="stat-num">34</div>
        <div class="stat-label">CITIES</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="days-to-start">—</div>
        <div class="stat-label">DAYS TO GOYANG</div>
      </div>
    </div>
  </div>
</div>

<div class="tabs-bar">
  <div class="tabs-inner">
    <div class="tab active" onclick="showTab('all')">すべて</div>
    <div class="tab" onclick="showTab('ticket')">🎫 申し込み</div>
    <div class="tab" onclick="showTab('concert')">🎤 コンサート</div>
    <div class="tab" onclick="showTab('calendar')">📅 カレンダー</div>
    <div class="tab" onclick="showTab('memos')">📝 マイメモ</div>
  </div>
</div>

<div class="main">
  <div id="tab-all">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>コンサート</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>日本チケット申し込み</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>グローバルチケット申し込み</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>当落発表・入金</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>アルバム・特別イベント</div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('passed', this)">終了済み</button>
      <button class="filter-btn" onclick="setFilter('upcoming', this)">今後の予定</button>
    </div>

    <div class="timeline" id="timeline"></div>
  </div>

  <div id="tab-ticket" style="display:none">
    <div class="timeline" id="timeline-ticket"></div>
  </div>

  <div id="tab-concert" style="display:none">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>コンサート</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>日本チケット申し込み</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>グローバルチケット申し込み</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>当落発表・入金</div>
    </div>
    <div class="timeline" id="timeline-concert"></div>
  </div>

  <div id="tab-calendar" style="display:none">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">&#8592;</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" id="cal-next">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-popup-overlay" id="cal-overlay" onclick="closeCalPopup()"></div>
    <div class="cal-popup" id="cal-popup">
      <div class="cal-popup-date" id="cal-popup-date"></div>
      <div class="cal-popup-events" id="cal-popup-events"></div>
      <button class="cal-popup-close" onclick="closeCalPopup()">✕ 閉じる</button>
    </div>
  </div>

  <div id="tab-memos" style="display:none">
    <div class="memo-list" id="memo-list"></div>
  </div>
</div>

<div class="scroll-indicator" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
const TODAY = new Date('2026-02-28');

// All events data
const EVENTS = [
  // ALBUM & SPECIAL
  {
    id: 'album-preorder',
    date: '2026-01-16',
    type: 'album',
    typeLabel: 'ALBUM',
    name: '5th Album「ARIRANG」予約開始',
    detail: '11:00 KST',
    tags: ['global']
  },
  {
    id: 'album-release',
    date: '2026-03-20',
    type: 'album',
    typeLabel: 'ALBUM RELEASE',
    name: 'BTS 5th Album「ARIRANG」リリース',
    detail: '韓国：3月20日（金）13:00 KST\n日本：3月21日（土）CDショップ店頭・オンライン順次\n全14曲収録 / Deluxe Vinylのみ4月3日発売',
    tags: ['global']
  },
  {
    id: 'comeback-live',
    date: '2026-03-21',
    type: 'special',

// Sort events by date
EVENTS.sort((a, b) => new Date(a.date) - new Date(b.date));

// Memo storage
// In-memory memo store (works in all environments)
const _memoStore = {};
try {
  const saved = localStorage.getItem('bts_memos');
  if (saved) Object.assign(_memoStore, JSON.parse(saved));
} catch(e) {}

function getMemos() {
  return Object.assign({}, _memoStore);
}

function saveMemo(id, text) {
  if (text.trim()) {
    _memoStore[id] = text;
  } else {
    delete _memoStore[id];
  }
  try { localStorage.setItem('bts_memos', JSON.stringify(_memoStore)); } catch(e) {}
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  const dow = days[d.getDay()];
  const year = d.getFullYear();
  return { main: `${year < 2027 ? '' : '2027.'}${m}/${day}`, sub: `${year}.${String(m).padStart(2,'0')}.${String(day).padStart(2,'0')} (${dow})` };
}

function getDaysUntil(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.floor((d - TODAY) / (1000 * 60 * 60 * 24));
  return diff;
}

function isPassed(dateStr) {
  return getDaysUntil(dateStr) < 0;
}

let _cardCounter = 0;
function renderCard(event, container) {
  const memos = getMemos();
  const memo = memos[event.id] || '';
  const passed = isPassed(event.date);
  const daysUntil = getDaysUntil(event.date);
  const isToday = daysUntil === 0;
  const dateInfo = formatDate(event.date);
  const uid = event.id + '_' + (++_cardCounter); // unique per rendered card

  const card = document.createElement('div');
  card.className = `event-card ${event.type}${passed ? ' passed' : ''}${isToday ? ' today' : ''}`;
  card.dataset.id = event.id;
  card.dataset.type = event.type;
  card.dataset.passed = passed ? '1' : '0';

  let daysLabel = '';
  let daysClass = '';
  if (!passed) {
    if (daysUntil === 0) daysLabel = 'TODAY';
    else if (daysUntil <= 3) { daysLabel = `あと${daysUntil}日`; daysClass = 'very-soon'; }
    else if (daysUntil <= 14) { daysLabel = `あと${daysUntil}日`; daysClass = 'soon'; }
    else daysLabel = `あと${daysUntil}日`;
  } else {
    daysLabel = `${Math.abs(daysUntil)}日前`;
  }

  let tagsHTML = '';
  if (event.tags.includes('jp')) tagsHTML += '<span class="tag tag-jp">日本</span>';
  if (event.tags.includes('fc')) tagsHTML += '<span class="tag tag-fc">FC会員</span>';
  if (event.tags.includes('mobile')) tagsHTML += '<span class="tag tag-mobile">モバイル</span>';
  if (event.tags.includes('army')) tagsHTML += '<span class="tag tag-army">ARMY会員</span>';
  if (event.tags.includes('global')) tagsHTML += '<span class="tag tag-global">GLOBAL</span>';
  if (event.tags.includes('free')) tagsHTML += '<span class="tag tag-free">無料</span>';

  card.innerHTML = `
    <div class="event-date">
      <div class="date-main">${dateInfo.main}</div>
      <div class="date-sub">${dateInfo.sub.split(' ')[1] || ''}</div>
    </div>
    <div class="event-body">
      <div class="event-type">${event.typeLabel}</div>
      <div class="event-name">${event.name}${memo ? '<span class="has-memo-dot"></span>' : ''}</div>
      <div class="event-detail">${event.detail.replace(/\n/g, '<br>')}</div>
      ${tagsHTML ? `<div class="event-tags">${tagsHTML}</div>` : ''}
    </div>
    <div class="event-actions">
      ${isToday ? '<div class="today-badge">TODAY</div>' : ''}
      <div class="days-until ${daysClass}">${daysLabel}</div>
    </div>
    <div class="memo-area${memo ? ' open' : ''}" id="memo-${uid}">
      <div class="memo-label">📝 マイメモ</div>
      <textarea class="memo-input" placeholder="メモを入力...">${memo}</textarea>
      <div>
        <button class="memo-btn">保存</button>
        <span class="memo-saved" id="saved-${uid}">✓ 保存しました</span>
      </div>
    </div>
  `;

  // Click to toggle memo
  card.addEventListener('click', function(e) {
    if (e.target.closest('.memo-area') || e.target.classList.contains('memo-btn')) return;
    card.querySelector('.memo-area').classList.toggle('open');
  });

  // Save button
  card.querySelector('.memo-btn').addEventListener('click', function() {
    const text = card.querySelector('.memo-input').value;
    saveMemo(event.id, text);
    // Update all memo dots for this event across all tabs
    document.querySelectorAll(`[data-id="${event.id}"] .event-name`).forEach(el => {
      const existing = el.querySelector('.has-memo-dot');
      if (text.trim()) {
        if (!existing) el.insertAdjacentHTML('beforeend', '<span class="has-memo-dot"></span>');
      } else {
        if (existing) existing.remove();
      }
    });
    // Update all textareas for this event across all tabs
    document.querySelectorAll(`[data-id="${event.id}"] .memo-input`).forEach(ta => ta.value = text);
    const savedEl = card.querySelector('.memo-saved');
    if (savedEl) { savedEl.style.display = 'inline'; setTimeout(() => savedEl.style.display = 'none', 2000); }
    renderMemoList();
  });

  container.appendChild(card);
}



function renderTimeline(container, filterType) {
  container.innerHTML = '';
  const memos = getMemos();

  let filtered = EVENTS;
  if (filterType === 'concert') filtered = EVENTS.filter(e => e.type === 'concert');
  else if (filterType === 'ticket') filtered = EVENTS.filter(e => ['ticket-jp', 'ticket-global', 'result'].includes(e.type));

  filtered.forEach(event => renderCard(event, container));
}

let currentFilter = 'all';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const cards = document.querySelectorAll('#timeline .event-card');
  cards.forEach(card => {
    const passed = card.dataset.passed === '1';
    if (filter === 'all') card.style.display = '';
    else if (filter === 'passed') card.style.display = passed ? '' : 'none';
    else if (filter === 'upcoming') card.style.display = !passed ? '' : 'none';
  });
}

function renderMemoList() {
  const container = document.getElementById('memo-list');
  container.innerHTML = '';
  const memos = getMemos();
  const keys = Object.keys(memos);

  if (keys.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <div class="empty-text">まだメモがありません<br>各イベントをクリックしてメモを追加できます</div>
      </div>
    `;
    return;
  }

  const memoEvents = EVENTS.filter(e => memos[e.id]);
  memoEvents.forEach(event => {
    const entry = document.createElement('div');
    entry.className = 'memo-entry';
    const dateInfo = formatDate(event.date);
    entry.innerHTML = `
      <div class="memo-entry-date">${dateInfo.sub}</div>
      <div class="memo-entry-event">${event.name}</div>
      <div class="memo-entry-text">${memos[event.id]}</div>
    `;
    container.appendChild(entry);
  });
}

function getLinkedTickets(concertId) {

  return EVENTS.filter(e => ids.includes(e.id));

function showTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

  document.getElementById('tab-' + tab).style.display = 'block';
  event.target.classList.add('active');

  // Re-render on every tab open so memo state is always fresh
  if (tab === 'calendar') { if(!calYear) initCalendar(); else renderCalendar(); }
  if (tab === 'all') renderTimeline(document.getElementById('timeline'), 'all');
  if (tab === 'ticket') renderTimeline(document.getElementById('timeline-ticket'), 'ticket');
  if (tab === 'concert') renderConcertTimeline();
  if (tab === 'memos') renderMemoList();
}

// ── CALENDAR ──────────────────────────────────────────
const TYPE_COLOR = {
  'concert':      'var(--red)',
  'ticket-jp':    'var(--gold)',
  'ticket-global':'var(--blue)',
  'result':       'var(--green)',
  'album':        'var(--purple)',
  'special':      '#FF6B35',
};

let calYear, calMonth;

function initCalendar() {
  const now = TODAY;
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
  document.getElementById('cal-prev').onclick = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  document.getElementById('cal-next').onclick = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent = months[calMonth] + ' ' + calYear;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day of week headers
  ['日','月','火','水','木','金','土'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Build event map for this month
  const eventMap = {}; // 'YYYY-MM-DD' => [events]
  EVENTS.forEach(e => {
    const d = e.date.substring(0,7); // YYYY-MM
    const ym = calYear + '-' + String(calMonth+1).padStart(2,'0');
    if(d === ym) {
      if(!eventMap[e.date]) eventMap[e.date] = [];
      eventMap[e.date].push(e);
    }
  });

  // First day of month
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = TODAY.toISOString().substring(0,10);

  // Empty cells
  for(let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Day cells
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const events = eventMap[dateStr] || [];
    const el = document.createElement('div');
    el.className = 'cal-day' + (events.length ? ' has-events' : '') + (dateStr === todayStr ? ' is-today' : '');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d;
    el.appendChild(num);

    if(events.length) {
      const dots = document.createElement('div');
      dots.className = 'cal-dots';
      // Show up to 4 dots
      const shown = events.slice(0,4);
      shown.forEach(ev => {
        const dot = document.createElement('div');
        dot.className = 'cal-dot';
        dot.style.background = TYPE_COLOR[ev.type] || '#888';
        dots.appendChild(dot);
      });
      if(events.length > 4) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot';
        dot.style.background = '#555';
        dots.appendChild(dot);
      }
      el.appendChild(dots);
      el.onclick = () => openCalPopup(dateStr, events);
    }

    grid.appendChild(el);
  }
}

function openCalPopup(dateStr, events) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  document.getElementById('cal-popup-date').textContent = label;

  const container = document.getElementById('cal-popup-events');
  container.innerHTML = '';

  events.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'cal-popup-event';
    item.innerHTML = `
      <div class="cal-popup-event-left">
        <div class="cal-popup-event-bar" style="background:${TYPE_COLOR[ev.type] || '#888'}"></div>
        <div class="cal-popup-event-info">
          <div class="cal-popup-event-type">${ev.typeLabel}</div>
          <div class="cal-popup-event-name">${ev.name}</div>
        </div>
      </div>
      <div class="cal-popup-event-arrow">→</div>
    `;
    item.onclick = () => jumpToEvent(ev);
    container.appendChild(item);
  });

  document.getElementById('cal-popup').classList.add('open');
  document.getElementById('cal-overlay').classList.add('open');
}

function closeCalPopup() {
  document.getElementById('cal-popup').classList.remove('open');
  document.getElementById('cal-overlay').classList.remove('open');
}

function jumpToEvent(ev) {
  closeCalPopup();

  // Determine which tab to show
  let targetTab;
  if(ev.type === 'concert') targetTab = 'concert';
  else if(['ticket-jp','ticket-global','result'].includes(ev.type)) targetTab = 'ticket';
  else targetTab = 'all';

  // Switch to tab
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + targetTab).style.display = 'block';
  document.querySelectorAll('.tab').forEach(el => {
    if(el.getAttribute('onclick') && el.getAttribute('onclick').includes("'" + targetTab + "'")) {
      el.classList.add('active');
    }
  });

  // Re-render target tab
  if(targetTab === 'concert') renderConcertTimeline();
  else if(targetTab === 'ticket') renderTimeline(document.getElementById('timeline-ticket'), 'ticket');
  else renderTimeline(document.getElementById('timeline'), 'all');

  // Scroll to the card
  setTimeout(() => {
    const card = document.querySelector(`[data-id="${ev.id}"]`);
    if(card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      // Highlight briefly
      card.style.outline = '2px solid var(--red)';
      setTimeout(() => card.style.outline = '', 1800);
    }
  }, 100);
}
